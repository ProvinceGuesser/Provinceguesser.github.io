<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Редактор стрелок</title>
  <link rel="stylesheet" href="link-editor.css" />
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <h1>Редактор стрелок</h1>

      <label class="field">
        <span>Текущая точка</span>
        <select id="fromPoint"></select>
      </label>

      <label class="field">
        <span>Точка назначения</span>
        <select id="toPoint"></select>
      </label>

      <label class="field">
        <span>Подпись стрелки</span>
        <input id="linkLabel" type="text" placeholder="Например: Вперёд" />
      </label>

      <div class="coords-box">
        <div><strong>pano_x:</strong> <span id="panoX">—</span></div>
        <div><strong>pano_y:</strong> <span id="panoY">—</span></div>
      </div>

      <div class="btns">
        <button id="btnSave">Сохранить связь</button>
        <button id="btnDelete" class="ghost">Удалить выбранную</button>
        <button id="btnClearMarker" class="ghost">Сбросить стрелку</button>
        <a href="../moderation/" class="corner-nav-btn">← Назад к модерации</a>
      </div>

      <div class="help">
        Кликни по панораме, чтобы поставить стрелку перехода.
      </div>

      <a href="../" class="corner-nav-btn">← Назад к игре</a>
    </aside>

    <main class="workspace">
      <section class="viewer-block">
        <div class="viewer-title">Панорама точки</div>
        <div class="panorama" id="panorama">
          <div class="panorama__viewport" id="panoramaViewport">
            <img id="panoramaImg" class="panorama__img" alt="Панорама" draggable="false" />
          </div>
          <div id="hotspotLayer" class="hotspot-layer"></div>
          <div class="placeholder" id="panoramaPlaceholder">Выбери точку</div>
        </div>
      </section>

      <section class="viewer-block">
        <div class="viewer-title">Существующие связи</div>
        <div id="linksList" class="links-list"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../supabase-config.js"></script>
  <script src="link-editor.js"></script>
</body>
</html>
