<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Модерация панорам</title>
  <link rel="stylesheet" href="moderation.css" />
</head>
<body>
  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <h1>Вход в модерацию</h1>

      <label class="login-field">
        <span>Логин</span>
        <input id="loginUsername" type="text" />
      </label>

      <label class="login-field">
        <span>Пароль</span>
        <input id="loginPassword" type="password" />
      </label>

      <button id="btnLogin">Войти</button>
      <div id="loginStatus" class="login-status"></div>
    </div>
  </div>

  <!-- ADMIN -->
  <div class="page hidden" id="adminPage">
    <div class="topbar">
      <h1>Модерация панорам</h1>
      <div class="topbar__actions">
        <button id="btnExportApproved">Экспорт approved в points.js</button>
        <button id="btnReload">Обновить</button>
        <button id="btnLogout" class="reject">Выйти</button>
      </div>
    </div>

    <div class="mod-tabs">
      <button class="mod-tab active" data-status="pending">Pending</button>
      <button class="mod-tab" data-status="approved">Approved</button>
      <button class="mod-tab" data-status="rejected">Rejected</button>
    </div>

    <div class="admin-layout">
      <!-- Левая колонка -->
      <div class="left-col">
        <div class="export-box hidden" id="exportBoxWrap">
          <h2>Готовый points.js</h2>
          <textarea id="exportBox" readonly></textarea>
          <button id="btnCopyExport">Копировать points.js</button>
        </div>

        <div id="list" class="list"></div>
      </div>

      <!-- Правая колонка -->
      <div class="right-col">
        <div class="map-panel" id="mapPanel">
          <div class="map-panel__top">
            <h2>Карта заявок</h2>

            <div class="map-panel__top-right">
              <div class="map-panel__legend">
                <span><i class="legend-dot legend-dot--existing"></i> Уже добавлено</span>
                <span><i class="legend-dot legend-dot--pending"></i> Pending</span>
                <span><i class="legend-dot legend-dot--approved"></i> Approved</span>
                <span><i class="legend-dot legend-dot--rejected"></i> Rejected</span>
              </div>

              <button id="btnToggleMap" type="button" class="map-toggle-btn">Свернуть карту</button>
            </div>
          </div>

          <div class="map-panel__body" id="mapPanelBody">
            <div class="mod-map-toolbar">
              <button id="modMapZoomIn" type="button">+</button>
              <button id="modMapZoomOut" type="button">−</button>
              <button id="modMapReset" type="button">Сброс</button>
            </div>

            <div class="mod-map" id="modMap">
              <div class="mod-map__inner" id="modMapInner">
                <img src="../map.jpg" alt="Map" class="mod-map__img" />
                <div id="modMapMarkers" class="mod-map__markers"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../supabase-config.js"></script>
  <script src="moderation.js"></script>
</body>
</html>
